platforms:
  - vm
  - chrome
# TODO: Consider testing on Firefox

compilers:
 - kernel
 - dart2wasm
 - dart2js

presets:
  ci:
    timeout: 3x

    # Pub has a huge number of small suites, which means test is frequently
    # loading new ones. Keeping concurrency low helps limit load timeouts.
    concurrency: 1
